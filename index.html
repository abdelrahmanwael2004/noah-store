<head>

    <title>متجر نوح - NOAH | فخامة النظافة</title>

    <style>
        /* --- الإعدادات العامة --- */
        :root {
            --main-bg-color: #032e3b; /* الكحلي الملكي الموحد */
            --gold-color: #c5a059;     /* الذهبي المعتمد */
            --text-dark: #111;
            --text-light: #fff;
            --section-bg: #f9f9f9;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--section-bg); color: #333; scroll-behavior: smooth;
        }

        /* --- تصميم الهيدر الذكي (Responsive Header) --- */
        .header-noah {
            background-color: var(--main-bg-color);
            width: 100%;
            /* نسبة العرض إلى الارتفاع للحفاظ على تناسب الصورة في الكمبيوتر */
            aspect-ratio: 1920 / 450; 
            min-height: 250px; /* ضمان حد أدنى للارتفاع */
            max-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .header-noah img {
            width: 100%; height: 100%;
            /* الكود السحري: cover تملأ المكان بالكامل وتمنع الحواف، وتخفي الليمون تلقائياً في الشاشات العريضة */
            object-fit: cover; 
            object-position: center top; /* تركيز اللوجو في المنتصف العلوي */
            display: block;
        }

        /* تعديلات الموبايل لضمان ظهور اللوجو والمنتجات */
        @media (max-width: 768px) {
            .header-noah {
                aspect-ratio: 16 / 9; /* نسبة تناسب الموبايل */
                min-height: 200px;
            }
            .header-noah img {
                object-fit: contain; /* إظهار التصميم كاملاً على الموبايل لتجنب القص */
                background-color: var(--main-bg-color); /* دمج لون الخلفية في حالة وجود فراغ */
            }
        }

        /* --- شريط التنقل (Menu) --- */
        nav {
            background-color: #111; padding: 15px 0; text-align: center;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        nav a {
            color: var(--gold-color); text-decoration: none; margin: 0 15px;
            font-weight: bold; font-size: 18px; transition: 0.3s;
        }
        nav a:hover { color: var(--text-light); }

        /* --- حاوية المنتجات الفخمة --- */
        .container { padding: 60px 20px; max-width: 1200px; margin: auto; }
        .section-title { text-align: center; margin-bottom: 50px; font-size: 32px; color: var(--text-dark); position: relative; padding-bottom: 10px;}
        .section-title::after {
            content: ''; display: block; width: 80px; height: 3px; background-color: var(--gold-color); position: absolute; bottom: 0; right: 50%; transform: translateX(50%);
        }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; justify-items: center;}

        /* --- كارت المنتج المطور --- */
        .product-card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center;
            padding-bottom: 30px; border: 1px solid #eee; transition: transform 0.3s, box-shadow 0.3s;
            width: 100%; max-width: 380px;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }

        .image-container {
            position: relative; width: 100%; height: 380px;
            background-color: #fff; cursor: pointer;
            overflow: hidden;
        }
        .image-container img {
            width: 100%; height: 100%; object-fit: contain;
            position: absolute; top: 0; left: 0;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out; padding: 20px;
        }
        .img-back { opacity: 0; transform: scale(1.1); }
        
        /* تأثير الـ Hover على صورة المنتج */
        .product-card:hover .img-back { opacity: 1; transform: scale(1); }
        .product-card:hover .img-front { opacity: 0; }

        .product-details { padding: 0 20px; }
        .product-details h3 { font-size: 20px; color: var(--text-dark); margin: 15px 0 5px; }
        .product-details p.hint { color: #888; font-size: 13px; margin: 0 0 15px; font-style: italic;}

        .price { color: #27ae60; font-size: 28px; font-weight: bold; margin: 15px 0; }
        
        /* زر الإضافة - ذهبي وفخم */
        .btn-add {
            background-color: #111; color: var(--gold-color); border: 2px solid var(--gold-color);
            padding: 14px 40px; border-radius: 5px; cursor: pointer;
            font-weight: bold; transition: 0.3s; text-decoration: none; display: inline-block;
            font-size: 18px;
        }
        .btn-add:hover { background-color: var(--gold-color); color: var(--text-light); }

        /* --- التذييل الاحترافي (Footer) --- */
        .contact-footer {
            background-color: #111; color: var(--text-light); padding: 70px 20px;
            text-align: center; margin-top: 60px; border-top: 5px solid var(--gold-color);
        }
        .contact-footer h3 { font-size: 26px; margin-bottom: 20px; }
        .contact-footer p { font-size: 18px; margin-bottom: 10px; }
        .phone-link {
            display: inline-block; color: var(--gold-color); font-size: 30px;
            text-decoration: none; font-weight: bold; margin-top: 15px;
            transition: 0.3s;
        }
        .phone-link:hover { color: var(--text-light); transform: scale(1.05); }

        /* --- زر الواتساب العائم المطّور --- */
        .whatsapp-float {
            position: fixed; bottom: 30px; left: 30px; background-color: #25d366;
            color: white; width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 1000; transition: 0.3s;
            text-decoration: none; font-size: 30px;
        }
        .whatsapp-float:hover { transform: scale(1.1) rotate(5deg); }
        .whatsapp-float i { /* إذا أردت استخدام أيقونة FontAwesome */
            font-family: 'FontAwesome'; content: '\f232'; 
        }

        /* تعديلات للشاشات الصغيرة جداً */
        @media (max-width: 480px) {
            .section-title { font-size: 26px; }
            .product-card { max-width: 100%; width: 320px; }
            .image-container { height: 320px; }
            .price { font-size: 24px; }
            .phone-link { font-size: 26px; }
        }
    /* --- التعديل السحري للهيدر --- */
.header-container {
    background-color: #032e3b; /* نفس لون صورتك بالضبط */
    width: 100%;
    /* النسبة دي هي اللي هتحافظ على أبعاد صورتك (عرض / طول) */
    aspect-ratio: 1920 / 450; 
    
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}

.header-container img {
    width: 100%;
    height: 100%;
    /* الخاصية دي بتخلي الصورة "تتمدد" بذكاء داخل الإطار بدون زوم مشوه */
    object-fit: cover; 
    object-position: center center;
}

/* تعديل خاص للموبايل عشان اللوجو ميبقاش صغير أوي */
@media (max-width: 768px) {
    .header-container {
        /* بنخلي الارتفاع يكبر شوية في الموبايل */
        aspect-ratio: 4 / 3; 
    }
    .header-container img {
        /* بنخلي الصورة تظهر كاملة في الموبايل حتى لو فيه فراغ كحلي بسيط */
        object-fit: contain; 
    }
}
